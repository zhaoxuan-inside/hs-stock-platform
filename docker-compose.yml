version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: hs-stock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certificates:/etc/nginx/certificates
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - hs-stock-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hs-stock-frontend
    volumes:
      - frontend-logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - hs-stock-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hs-stock-backend
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=hs-stock-platform
      - POSTGRES_DB=hs_stock_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - MONGODB_HOST=mongo
      - MONGODB_PORT=27017
      - MONGODB_DB=hs_stock_mongo
      - ETCD_HOST=etcd
      - ETCD_PORT=2379
      - JWT_SECRET_KEY=your-secret-key-here-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DEBUG=false
    volumes:
      - backend-logs:/app/logs
    depends_on:
      - postgres
      - redis
      - mongo
      - etcd
    networks:
      - hs-stock-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hs-stock-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=hs-stock-platform
      - POSTGRES_DB=hs_stock_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - hs-stock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: hs-stock-redis
    command: redis-server --requirepass "" --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - hs-stock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    container_name: hs-stock-mongo
    environment:
      - MONGO_INITDB_DATABASE=hs_stock_mongo
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - hs-stock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 30s
      timeout: 10s
      retries: 3

  etcd:
    image: bitnami/etcd:3.5
    container_name: hs-stock-etcd
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    volumes:
      - etcd-data:/bitnami/etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - hs-stock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "etcdctl endpoint health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  etcd-data:
  nginx-logs:
  frontend-logs:
  backend-logs:

networks:
  hs-stock-network:
    driver: bridge